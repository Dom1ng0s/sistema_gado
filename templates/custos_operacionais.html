{% extends 'base.html' %}
{% block title %}Lançar Custo{% endblock %}

{% block content %}

<div class="page-header">
  <div>
    <p class="label">Financeiro</p>
    <h1 class="page-title">Lançar Custo Operacional</h1>
  </div>
  <a href="{{ url_for('financeiro.financeiro') }}" class="btn btn-ghost btn-sm">← Financeiro</a>
</div>

{% if mensagem %}
  <div class="alert alert-danger" role="alert" style="margin-bottom:var(--space-6);">
    <span class="alert-icon" aria-hidden="true"><svg class="icon icon-md" viewBox="0 0 24 24"><path d="m10.29 3.86-8.6 14.9A2 2 0 0 0 3.43 22h17.14a2 2 0 0 0 1.74-2.84l-8.6-14.9a2 2 0 0 0-3.42 0Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg></span>
    <div>{{ mensagem }}</div>
  </div>
{% endif %}

<div style="max-width:480px;">
  <form action="{{ url_for('financeiro.custos_operacionais') }}" method="POST" class="form-container">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--space-4);">
      <div class="form-group">
        <label for="data">Data do Custo</label>
        <input id="data" type="date" name="data" class="form-input" required>
      </div>

      <div class="form-group">
        <label for="valor">Valor Total (R$)</label>
        <input id="valor" type="number" step="0.01" name="valor"
               class="form-input" required placeholder="0.00">
        <span class="form-hint">Ex: 1500.00 (separador: ponto)</span>
      </div>
    </div>

    <div class="form-group">
      <label for="categoria">Categoria</label>
      <select id="categoria" name="categoria" class="form-input" onchange="toggleTipo()">
        <option value="Fixo">Custo Fixo (Mensal)</option>
        <option value="Variavel">Custo Variável (Por Uso)</option>
      </select>
    </div>

    <div class="form-group" id="div_fixo">
      <label for="tipo_fixo">Tipo de Custo Fixo</label>
      <select id="tipo_fixo" name="tipo_fixo" class="form-input">
        {% for item in fixos %}
          <option value="{{ item }}">{{ item }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group" id="div_variavel" style="display:none;">
      <label for="tipo_variavel">Tipo de Custo Variável</label>
      <select id="tipo_variavel" name="tipo_variavel" class="form-input">
        {% for item in variaveis %}
          <option value="{{ item }}">{{ item }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="descricao">Descrição Opcional</label>
      <input id="descricao" type="text" name="descricao" class="form-input"
             placeholder="Ex: Compra de 5 sacos de sal">
    </div>

    <div style="display:flex; gap:var(--space-3);">
      <button type="submit" class="btn btn-primary">Registrar Custo</button>
      <a href="{{ url_for('financeiro.financeiro') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>

{% endblock %}

{% block scripts %}
<script>
function toggleTipo() {
  const cat = document.getElementById('categoria').value;
  document.getElementById('div_fixo').style.display    = cat === 'Fixo' ? 'block' : 'none';
  document.getElementById('div_variavel').style.display = cat === 'Variavel' ? 'block' : 'none';
}

document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('form').forEach(form => {
    form.addEventListener('submit', function () {
      const btn = form.querySelector('button[type="submit"]');
      if (btn && !btn.classList.contains('btn-loading')) {
        btn.classList.add('btn-loading');
        btn.disabled = true;
      }
    });
  });
});
</script>
{% endblock %}
