<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Gado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <div class="auth-card login-mode">
        <h2>🤠 Acesso ao Rebanho</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="{{ 'alert-error' if category == 'error' else 'alert-success' }}" style="{% if category != 'error' %}background:#EAF3DE;color:#3B6D11;border:1px solid #C0DD97;{% endif %}padding:10px;border-radius:5px;margin-bottom:15px;font-size:14px;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% if mensagem %}
            <div class="alert-error">{{ mensagem }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" name="username" required placeholder="Digite seu usuário">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="password" required placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn-primary">ENTRAR NO SISTEMA</button>
            <div style="text-align:center;margin-top:10px;">
                <a href="{{ url_for('auth.esqueci_senha') }}" class="link-secondary">Esqueceu sua senha?</a>
            </div>
            <a href="{{ url_for('auth.novo_usuario') }}" class="btn btn-secondary" style="margin-top: 10px; display: block; text-align: center;">
                👤 Não Tenho Conta
            </a>
        </form>
    </div>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const formularios = document.querySelectorAll("form");
        
        formularios.forEach(form => {
            form.addEventListener("submit", function(event) {
                const botaoSubmit = form.querySelector("button[type='submit']");
                
                if (botaoSubmit) {
                    if (botaoSubmit.classList.contains("btn-loading")) {
                        event.preventDefault();
                        return;
                    }
                    botaoSubmit.classList.add("btn-loading");
                    botaoSubmit.setAttribute("disabled", "true");
                }
            });
        });
    });
</script>
</body>
</html>
