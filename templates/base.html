<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SGG{% endblock %} — Sistema de Gestão de Gado</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">

  <!-- Google Fonts — preconnect first, then stylesheet with font-display=swap -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Rubik:wght@400;500;600&display=swap">

  <!-- Design System único -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/design_system.css') }}">

  {% block extra_css %}{% endblock %}
</head>
<body>

<a class="skip-link" href="#main-content">Ir ao conteúdo principal</a>

<nav class="nav">
  <a class="nav-logo" href="{{ url_for('operacional.painel') }}">
    <svg aria-hidden="true" class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
      <path d="M4 8c0-2 1-3 2-3s2 .5 3 1.5C10 7.5 11 8 12 8s2-.5 3-1.5C16 5.5 17 5 18 5s2 1 2 3v1c0 3-1.5 5-4 6l-1 4H9l-1-4C5.5 14 4 12 4 9V8Z"/>
      <path d="M2 6c.5-1 1.5-1.5 2-1M22 6c-.5-1-1.5-1.5-2-1"/>
    </svg>
    SGG
  </a>
  <div class="nav-links" id="nav-links">
    <a href="{{ url_for('operacional.painel') }}"
       class="nav-link{% if request.endpoint and request.endpoint.startswith('operacional') %} active{% endif %}">
      Rebanho
    </a>
    <a href="{{ url_for('financeiro.financeiro') }}"
       class="nav-link{% if request.endpoint and request.endpoint.startswith('financeiro') %} active{% endif %}">
      Financeiro
    </a>
    <a href="{{ url_for('pastos.listar_pastos') }}"
       class="nav-link{% if request.endpoint and request.endpoint.startswith('pastos') %} active{% endif %}">
      Pastos
    </a>
    <a href="{{ url_for('estoque.lista_estoque') }}"
       class="nav-link{% if request.endpoint and request.endpoint.startswith('estoque') %} active{% endif %}">
      Estoque
    </a>
    <a href="{{ url_for('api.graficos_page') }}"
       class="nav-link{% if request.endpoint == 'api.graficos_page' %} active{% endif %}">
      Relatórios
    </a>
    <a href="{{ url_for('configuracoes.settings') }}"
       class="nav-link{% if request.endpoint and request.endpoint.startswith('configuracoes') %} active{% endif %}">
      Configurações
    </a>
  </div>
  <div class="nav-right">
    <a href="{{ url_for('auth.logout') }}" class="btn btn-ghost btn-sm">Sair</a>
    <button class="nav-hamburger" id="nav-toggle" aria-label="Menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

<main class="page-container" id="main-content">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}

<script>
(function () {
  var toggle = document.getElementById('nav-toggle');
  var links  = document.getElementById('nav-links');
  if (!toggle || !links) return;

  toggle.addEventListener('click', function () {
    var open = links.classList.toggle('open');
    this.setAttribute('aria-expanded', open);
  });

  links.querySelectorAll('.nav-link').forEach(function (link) {
    link.addEventListener('click', function () {
      links.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    });
  });
})();
</script>

</body>
</html>
