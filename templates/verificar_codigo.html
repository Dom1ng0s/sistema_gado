<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG — Verificar Código</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design_system.css') }}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: var(--font-body);
            background: var(--color-surface-sunken);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .auth-card {
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            border: 0.5px solid var(--color-border);
            box-shadow: var(--shadow-md);
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            animation: rise 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }

        .auth-mark {
            width: 34px;
            height: 34px;
            background: var(--color-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }

        .auth-brand-text {
            font-family: var(--font-display);
            font-size: 13px;
            color: var(--color-ink-tertiary);
        }

        .auth-heading { margin-bottom: 8px; }

        .auth-heading h1 {
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: 600;
            color: var(--color-ink);
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .auth-heading p {
            font-size: var(--text-sm);
            color: var(--color-ink-tertiary);
            line-height: 1.6;
        }

        .countdown {
            font-size: var(--text-sm);
            color: var(--color-ink-tertiary);
            text-align: center;
            margin: 16px 0;
            font-weight: 500;
        }

        .countdown.expired { color: var(--color-danger); }

        /* OTP inputs */
        .otp-wrap {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 20px 0 6px;
        }

        .otp-wrap input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 600;
            color: var(--color-ink);
            background: var(--color-surface-raised);
            border: 0.5px solid var(--color-border-strong);
            border-radius: var(--radius-md);
            padding: 0;
            outline: none;
            transition: border-color 150ms, box-shadow 150ms, background 150ms;
        }

        .otp-wrap input:focus {
            background: var(--color-surface);
            border-color: var(--color-primary-mid);
            box-shadow: 0 0 0 3px var(--color-primary-bg);
        }

        .otp-wrap input.filled {
            border-color: var(--color-primary-mid);
            background: var(--color-primary-bg);
        }

        .btn-submit {
            width: 100%;
            padding: 11px 16px;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: var(--text-base);
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: background 150ms, box-shadow 150ms, transform 80ms;
            box-shadow: 0 1px 3px rgba(59,109,17,0.3);
        }

        .btn-submit:hover { background: var(--color-primary-dark); box-shadow: 0 2px 8px rgba(59,109,17,0.4); }
        .btn-submit:active { transform: scale(0.99); }
        .btn-submit:disabled { opacity: 0.5; pointer-events: none; }

        .auth-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .auth-link {
            font-size: var(--text-sm);
            color: var(--color-ink-tertiary);
            text-decoration: none;
            transition: color 150ms;
        }

        .auth-link:hover { color: var(--color-primary); }

        .flash {
            padding: 10px 12px;
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .flash-error { background: var(--color-danger-bg); color: var(--color-danger-dark); border-left: 3px solid var(--color-danger); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-mark">S</div>
            <span class="auth-brand-text">Sistema de Gestão de Gado</span>
        </div>

        <div class="auth-heading">
            <h1>Verificar Código</h1>
            <p>Código enviado para <strong>{{ email_mascarado }}</strong></p>
        </div>

        {% if mensagem %}
            <div class="flash flash-error">{{ mensagem }}</div>
        {% endif %}

        <div class="countdown" id="countdown"></div>

        <form method="POST" action="{{ url_for('auth.verificar_codigo') }}" id="formOTP">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="codigo" id="codigoFinal">

            <div class="otp-wrap" id="otpWrap">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" autocomplete="one-time-code">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit">
            </div>

            <button type="submit" class="btn-submit" id="btnVerificar" disabled>Verificar Código</button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('auth.login') }}" class="auth-link">← Voltar ao login</a>
            <a href="{{ url_for('auth.esqueci_senha') }}" class="auth-link">Reenviar código</a>
        </div>
    </div>

    <script>
        const digits     = document.querySelectorAll('.otp-digit');
        const finalInput = document.getElementById('codigoFinal');
        const btn        = document.getElementById('btnVerificar');
        const form       = document.getElementById('formOTP');

        digits[0].focus();

        digits.forEach((input, i) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/\D/g, '').slice(-1);
                input.classList.toggle('filled', input.value !== '');
                if (input.value && i < digits.length - 1) digits[i + 1].focus();
                updateCode();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && i > 0) {
                    digits[i - 1].value = '';
                    digits[i - 1].classList.remove('filled');
                    digits[i - 1].focus();
                    updateCode();
                }
            });
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
                [...paste].slice(0, 6).forEach((ch, j) => {
                    if (digits[i + j]) { digits[i + j].value = ch; digits[i + j].classList.add('filled'); }
                });
                updateCode();
                digits[Math.min(i + paste.length, digits.length - 1)].focus();
            });
        });

        function updateCode() {
            const code = [...digits].map(d => d.value).join('');
            finalInput.value = code;
            btn.disabled = code.length < 6;
        }

        let remaining = {{ expires_in_seconds | default(900) }};
        const countdownEl = document.getElementById('countdown');

        function tick() {
            if (remaining <= 0) {
                countdownEl.textContent = 'Código expirado. Solicite um novo.';
                countdownEl.classList.add('expired');
                btn.disabled = true;
                digits.forEach(d => d.disabled = true);
                return;
            }
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            countdownEl.textContent = `Expira em ${m}:${s.toString().padStart(2, '0')}`;
            remaining--;
            setTimeout(tick, 1000);
        }
        tick();

        form.addEventListener('submit', () => {
            btn.disabled = true;
            btn.textContent = 'Verificando...';
        });
    </script>
</body>
</html>
