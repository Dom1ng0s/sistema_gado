<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG — Verificar Código</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Rubik:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design_system.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <style>
        .auth-card { max-width: 420px; }
        .auth-heading { margin-bottom: 8px; }

        .countdown {
            font-size: var(--text-sm);
            color: var(--color-ink-tertiary);
            text-align: center;
            margin: 16px 0;
            font-weight: 500;
        }

        .countdown.expired { color: var(--color-danger); }

        /* OTP inputs */
        .otp-wrap {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 20px 0 6px;
        }

        .otp-wrap input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 600;
            color: var(--color-ink);
            background: var(--color-surface-raised);
            border: 0.5px solid var(--color-border-strong);
            border-radius: var(--radius-md);
            padding: 0;
            outline: none;
            transition: border-color 150ms, box-shadow 150ms, background 150ms;
        }

        .otp-wrap input:focus {
            background: var(--color-surface);
            border-color: var(--color-primary-mid);
            box-shadow: 0 0 0 3px var(--color-primary-bg);
        }

        .otp-wrap input.filled {
            border-color: var(--color-primary-mid);
            background: var(--color-primary-bg);
        }

        #btnVerificar { margin-top: 12px; }
        #btnVerificar:disabled { opacity: 0.5; }

        /* Footer com dois itens (link + reenviar), diferente do padrão centralizado de auth.css */
        .auth-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .auth-stepper { margin-bottom: 20px; }

        .flash { margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-mark">S</div>
            <span class="auth-brand-text">Sistema de Gestão de Gado</span>
        </div>

        <div class="auth-stepper" role="progressbar" aria-label="Passo 2 de 3">
            <div class="step-node done">
                <div class="step-circle">✓</div>
                <span class="step-lbl">Email</span>
            </div>
            <div class="step-line done"></div>
            <div class="step-node active">
                <div class="step-circle">2</div>
                <span class="step-lbl">Código</span>
            </div>
            <div class="step-line"></div>
            <div class="step-node">
                <div class="step-circle">3</div>
                <span class="step-lbl">Nova senha</span>
            </div>
        </div>

        <div class="auth-heading">
            <h1>Verificar Código</h1>
            <p>Código enviado para <strong>{{ email_mascarado }}</strong></p>
        </div>

        {% if mensagem %}
            <div class="flash flash-error">{{ mensagem }}</div>
        {% endif %}

        <div class="countdown" id="countdown"></div>

        <form method="POST" action="{{ url_for('auth.verificar_codigo') }}" id="formOTP">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="codigo" id="codigoFinal">

            <div class="otp-wrap" id="otpWrap">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" autocomplete="one-time-code">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit">
                <input type="text" inputmode="numeric" maxlength="1" class="otp-digit">
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="btnVerificar" disabled>Verificar Código</button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('auth.login') }}" class="auth-link">← Voltar ao login</a>
            <form method="POST" action="{{ url_for('auth.reenviar_codigo') }}" style="display:inline;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="btn btn-ghost btn-sm">Reenviar código</button>
            </form>
        </div>
    </div>

    <script>
        const digits     = document.querySelectorAll('.otp-digit');
        const finalInput = document.getElementById('codigoFinal');
        const btn        = document.getElementById('btnVerificar');
        const form       = document.getElementById('formOTP');

        digits[0].focus();

        digits.forEach((input, i) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/\D/g, '').slice(-1);
                input.classList.toggle('filled', input.value !== '');
                if (input.value && i < digits.length - 1) digits[i + 1].focus();
                updateCode();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && i > 0) {
                    digits[i - 1].value = '';
                    digits[i - 1].classList.remove('filled');
                    digits[i - 1].focus();
                    updateCode();
                }
            });
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
                [...paste].slice(0, 6).forEach((ch, j) => {
                    if (digits[i + j]) { digits[i + j].value = ch; digits[i + j].classList.add('filled'); }
                });
                updateCode();
                digits[Math.min(i + paste.length, digits.length - 1)].focus();
            });
        });

        function updateCode() {
            const code = [...digits].map(d => d.value).join('');
            finalInput.value = code;
            btn.disabled = code.length < 6;
        }

        let remaining = {{ expires_in_seconds | default(900) }};
        const countdownEl = document.getElementById('countdown');

        function tick() {
            if (remaining <= 0) {
                countdownEl.textContent = 'Código expirado. Solicite um novo.';
                countdownEl.classList.add('expired');
                btn.disabled = true;
                digits.forEach(d => d.disabled = true);
                return;
            }
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            countdownEl.textContent = `Expira em ${m}:${s.toString().padStart(2, '0')}`;
            remaining--;
            setTimeout(tick, 1000);
        }
        tick();

        form.addEventListener('submit', () => {
            btn.disabled = true;
            btn.textContent = 'Verificando...';
        });
    </script>
</body>
</html>
