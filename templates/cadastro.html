{% extends 'base.html' %}
{% block title %}Novo Animal{% endblock %}

{% block content %}

<div class="page-header">
  <div>
    <p class="label">Rebanho</p>
    <h1 class="page-title">Cadastrar Novo Animal</h1>
  </div>
  <a href="{{ url_for('operacional.painel') }}" class="btn btn-ghost btn-sm">← Voltar</a>
</div>

{% if mensagem %}
  <div class="alert alert-danger" style="margin-bottom:var(--space-6);">
    <span class="alert-icon">⚠</span>
    <div>{{ mensagem }}</div>
  </div>
{% endif %}

<div style="max-width:520px;">
  <form action="{{ url_for('operacional.cadastro') }}" method="POST" class="form-container">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
      <label for="brinco">Número do Brinco</label>
      <input id="brinco" type="text" name="brinco" class="form-input"
             required autocomplete="off" placeholder="Ex: A-001">
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:var(--space-4);">
      <div class="form-group">
        <label for="sexo">Sexo</label>
        <select id="sexo" name="sexo" class="form-input">
          <option value="M">Macho</option>
          <option value="F">Fêmea</option>
        </select>
      </div>

      <div class="form-group">
        <label for="data_compra">Data da Compra</label>
        <input id="data_compra" type="date" name="data_compra" class="form-input" required>
      </div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:var(--space-4);">
      <div class="form-group">
        <label for="peso_compra">Peso de Entrada (kg)</label>
        <input id="peso_compra" type="number" step="0.01" name="peso_compra"
               class="form-input" required placeholder="Ex: 300.0">
      </div>

      <div class="form-group">
        <label for="valor_arroba">Valor da Arroba na Compra (R$)</label>
        <input id="valor_arroba" type="number" step="0.01" name="valor_arroba"
               class="form-input" required placeholder="Ex: 250.00">
      </div>
    </div>

    <div style="display:flex; gap:var(--space-3); margin-top:var(--space-2);">
      <button type="submit" class="btn btn-primary">Salvar Animal</button>
      <a href="{{ url_for('operacional.painel') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('form').forEach(form => {
    form.addEventListener('submit', function () {
      const btn = form.querySelector('button[type="submit"]');
      if (btn && !btn.classList.contains('btn-loading')) {
        btn.classList.add('btn-loading');
        btn.disabled = true;
      }
    });
  });
});
</script>
{% endblock %}
