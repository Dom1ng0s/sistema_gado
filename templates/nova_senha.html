<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG — Nova Senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Rubik:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design_system.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <style>
        #btnSalvar:disabled { opacity: 0.5; }

        .strength-bar {
            height: 3px;
            background: var(--color-surface-sunken);
            border-radius: var(--radius-pill);
            margin-top: 6px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: var(--radius-pill);
            width: 0;
            transition: width 0.25s, background 0.25s;
        }

        .match-msg { font-size: var(--text-xs); margin-top: 5px; display: block; min-height: 16px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-mark">S</div>
            <span class="auth-brand-text">Sistema de Gestão de Gado</span>
        </div>

        <div class="auth-stepper" role="progressbar" aria-label="Passo 3 de 3">
            <div class="step-node done">
                <div class="step-circle">✓</div>
                <span class="step-lbl">Email</span>
            </div>
            <div class="step-line done"></div>
            <div class="step-node done">
                <div class="step-circle">✓</div>
                <span class="step-lbl">Código</span>
            </div>
            <div class="step-line done"></div>
            <div class="step-node active">
                <div class="step-circle">3</div>
                <span class="step-lbl">Nova senha</span>
            </div>
        </div>

        <div class="auth-heading">
            <h1>Nova Senha</h1>
            <p>Crie uma senha segura com pelo menos 6 caracteres.</p>
        </div>

        {% if mensagem %}
            <div class="flash flash-error">{{ mensagem }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.nova_senha') }}" id="formSenha">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="field">
                <label class="field-label" for="password">Nova Senha</label>
                <input type="password" id="password" name="password" class="field-input"
                       required autofocus placeholder="Mínimo 6 caracteres" minlength="6">
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            </div>

            <div class="field">
                <label class="field-label" for="password_confirm">Confirmar Senha</label>
                <input type="password" id="password_confirm" name="password_confirm" class="field-input"
                       required placeholder="Repita a nova senha">
                <span class="match-msg" id="matchMsg"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="btnSalvar" disabled>Salvar Nova Senha</button>
        </form>
    </div>

    <script>
        const pwInput  = document.getElementById('password');
        const cfInput  = document.getElementById('password_confirm');
        const fill     = document.getElementById('strengthFill');
        const matchMsg = document.getElementById('matchMsg');
        const btn      = document.getElementById('btnSalvar');

        pwInput.addEventListener('input', () => {
            const v = pwInput.value;
            let score = 0;
            if (v.length >= 6)  score++;
            if (v.length >= 10) score++;
            if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
            if (/\d/.test(v))   score++;
            if (/[^A-Za-z0-9]/.test(v)) score++;
            fill.style.width      = (score / 5 * 100) + '%';
            fill.style.background = score <= 1 ? 'var(--color-danger)' : score <= 3 ? 'var(--color-accent)' : 'var(--color-primary-mid)';
            validate();
        });

        cfInput.addEventListener('input', validate);

        function validate() {
            const match = pwInput.value === cfInput.value;
            if (cfInput.value) {
                matchMsg.textContent = match ? 'Senhas coincidem' : 'Senhas não coincidem';
                matchMsg.style.color = match ? 'var(--color-primary)' : 'var(--color-danger)';
            } else {
                matchMsg.textContent = '';
            }
            btn.disabled = !match || pwInput.value.length < 6;
        }

        document.getElementById('formSenha').addEventListener('submit', () => {
            btn.disabled = true;
            btn.textContent = 'Salvando...';
        });
    </script>
</body>
</html>
