{% extends 'base.html' %}
{% block title %}Nova Pesagem{% endblock %}

{% block content %}

<div class="page-header">
  <div>
    <p class="label">Rebanho</p>
    <h1 class="page-title">Registrar Pesagem</h1>
  </div>
  <a href="{{ url_for('operacional.detalhes', id_animal=id_animal) }}"
     class="btn btn-ghost btn-sm">← Voltar à ficha</a>
</div>

{% if mensagem %}
  <div class="alert alert-danger" style="margin-bottom:var(--space-6);">
    <span class="alert-icon" aria-hidden="true"><svg class="icon icon-md" aria-hidden="true" viewBox="0 0 24 24"><path d="m10.29 3.86-8.6 14.9A2 2 0 0 0 3.43 22h17.14a2 2 0 0 0 1.74-2.84l-8.6-14.9a2 2 0 0 0-3.42 0Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg></span>
    <div>{{ mensagem }}</div>
  </div>
{% endif %}

<div style="max-width:400px;">
  <form action="{{ url_for('operacional.nova_pesagem', id_animal=id_animal) }}"
        method="POST" class="form-container">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:var(--space-4);">
      <div class="form-group">
        <label for="data_pesagem">Data da Pesagem</label>
        <input id="data_pesagem" type="date" name="data_pesagem"
               class="form-input" required>
      </div>

      <div class="form-group">
        <label for="peso">Peso (kg)</label>
        <input id="peso" type="number" step="0.01" name="peso"
               class="form-input" required placeholder="Ex: 350.5">
      </div>
    </div>

    <div style="display:flex; gap:var(--space-3); margin-top:var(--space-2);">
      <a href="{{ url_for('operacional.detalhes', id_animal=id_animal) }}"
         class="btn btn-ghost">Cancelar</a>
      <button type="submit" class="btn btn-primary">Salvar Peso</button>
    </div>
  </form>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('form').forEach(form => {
    form.addEventListener('submit', function () {
      const btn = form.querySelector('button[type="submit"]');
      if (btn && !btn.classList.contains('btn-loading')) {
        btn.classList.add('btn-loading');
        btn.disabled = true;
      }
    });
  });
});
</script>
{% endblock %}
