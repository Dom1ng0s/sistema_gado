<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGG — Recuperar Senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Rubik:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design_system.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <style>
        .flash { display: flex; align-items: flex-start; gap: 8px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-brand">
            <div class="auth-mark">S</div>
            <span class="auth-brand-text">Sistema de Gestão de Gado</span>
        </div>

        <div class="auth-stepper" role="progressbar" aria-label="Passo 1 de 3">
            <div class="step-node active">
                <div class="step-circle">1</div>
                <span class="step-lbl">Email</span>
            </div>
            <div class="step-line"></div>
            <div class="step-node">
                <div class="step-circle">2</div>
                <span class="step-lbl">Código</span>
            </div>
            <div class="step-line"></div>
            <div class="step-node">
                <div class="step-circle">3</div>
                <span class="step-lbl">Nova senha</span>
            </div>
        </div>

        <div class="auth-heading">
            <h1>Recuperar Senha</h1>
            <p>Informe o email cadastrado. Enviaremos um código de verificação de 6 dígitos.</p>
        </div>

        {% if mensagem %}
            <div class="flash flash-error">{{ mensagem }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('auth.esqueci_senha') }}" id="form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="field">
                <label class="field-label" for="email">Email</label>
                <input type="email" id="email" name="email" class="field-input"
                       required autofocus placeholder="seu@email.com">
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="btnEnviar">Enviar Código</button>
        </form>

        <div class="auth-footer">
            <a href="{{ url_for('auth.login') }}" class="auth-link">← Voltar ao login</a>
        </div>
    </div>

    <script>
        document.getElementById('form').addEventListener('submit', function () {
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.textContent = 'Enviando...';
        });
    </script>
</body>
</html>
