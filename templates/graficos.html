<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Gráfico - Sistema Gado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='funcionalidades.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/patternomaly/dist/patternomaly.min.js"></script>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 20px;">
            <h1 style="border: none; margin: 0; padding: 0; width: auto;">Meu Rebanho</h1>
            <div class="switch-wrapper">
                <label class="switch">
                    <input type="checkbox" id="daltonicoSwitch" onchange="alternarCores()">
                    <span class="slider"></span>
                </label>
                <span class="label-switch">Modo Alto Contraste</span>
            </div>
        </div>
        <a href="{{ url_for('operacional.painel') }}" class="btn btn-secondary" style="padding: 5px 15px; font-size: 14px;">Voltar ao Painel</a>
    </div>

    <div class="grafico-container">
        <div class="grafico-box" style="display: block;">
            <h2>Composição (Sexo)</h2>
            <div id="loadSexo" style="padding: 40px; color: var(--color-musgo);">🔄 Carregando dados...</div>
            <canvas id="chartSexo" style="display:none;"></canvas>
        </div>
        <div class="grafico-box" style="display: block;">
            <h2>Distribuição de Peso (@)</h2>
            <div id="loadPeso" style="padding: 40px; color: var(--color-musgo);">🔄 Carregando dados...</div>
            <canvas id="chartPeso" style="display:none;"></canvas>
        </div>
        <div class="grafico-box">
            <h2>GMD Médio do Rebanho</h2>
            <div class="kpi-valor" id="txtGMD">🔄</div>
            <div class="kpi-sub">kg/dia (Média Global)</div>
        </div>
    </div>

    <script>
        let chartSexo = null, chartPeso = null, dadosGlobais = null;

        const CORES_PADRAO = {
            sexo: ['#3E6B32', '#C0392B'],
            peso: ['#B8D4B2', '#7A9E6E', '#3E6B32', '#253D1F']
        };
        const CORES_TEXTURA = {
            sexo: [pattern.draw('diagonal', '#2196F3'), pattern.draw('dot', '#F44336')],
            peso: [pattern.draw('ring', '#9E9E9E'), pattern.draw('box', '#FFC107'), pattern.draw('zigzag', '#2196F3'), pattern.draw('triangle', '#F44336')]
        };

        function desenharGraficos(usarTexturas) {
            if (!dadosGlobais) return;
            const paleta = usarTexturas ? CORES_TEXTURA : CORES_PADRAO;
            
            if (chartSexo) chartSexo.destroy();
            if (chartPeso) chartPeso.destroy();

            document.getElementById('loadSexo').style.display = 'none';
            document.getElementById('chartSexo').style.display = 'block';
            document.getElementById('loadPeso').style.display = 'none';
            document.getElementById('chartPeso').style.display = 'block';

            const ctxSexo = document.getElementById('chartSexo').getContext('2d');
            chartSexo = new Chart(ctxSexo, {
                type: 'doughnut',
                data: {
                    labels: ['Machos', 'Fêmeas'],
                    datasets: [{ data: [dadosGlobais.sexo.M || 0, dadosGlobais.sexo.F || 0], backgroundColor: paleta.sexo, borderWidth: 1 }]
                },
                options: { plugins: { legend: { position: 'bottom' } } }
            });

            const ctxPeso = document.getElementById('chartPeso').getContext('2d');
            chartPeso = new Chart(ctxPeso, {
                type: 'pie',
                data: {
                    labels: Object.keys(dadosGlobais.peso),
                    datasets: [{ data: Object.values(dadosGlobais.peso), backgroundColor: paleta.peso, borderWidth: 1 }]
                },
                options: { plugins: { legend: { position: 'bottom' } } }
            });

            const valorGMD = dadosGlobais.gmd_medio ? dadosGlobais.gmd_medio.toFixed(3) : "0.000";
            document.getElementById('txtGMD').innerText = valorGMD;
        }

        function alternarCores() { desenharGraficos(document.getElementById('daltonicoSwitch').checked); }

        // --- FASE 4: CACHE INTELIGENTE NO NAVEGADOR (LOCALSTORAGE) ---
        const CACHE_KEY = 'cache_graficos_rebanho';
        const TEMPO_CACHE_MS = 5 * 60 * 1000; // 5 minutos em milissegundos

        function carregarDados() {
            // 1. Tenta buscar do armazenamento do navegador
            const cacheSalvo = localStorage.getItem(CACHE_KEY);
            
            if (cacheSalvo) {
                const cache = JSON.parse(cacheSalvo);
                const tempoPassado = Date.now() - cache.timestamp;
                
                // Se o cache tem menos de 5 minutos, usa ele e aborta o fetch!
                if (tempoPassado < TEMPO_CACHE_MS) {
                    console.log("⚡ Carregado instantaneamente do LocalStorage");
                    dadosGlobais = cache.dados;
                    desenharGraficos(false);
                    return; 
                }
            }

            // 2. Se não tem cache ou já passou de 5 min, busca no servidor paralelamente
            console.log("🌍 Buscando dados atualizados no servidor...");
            Promise.all([
                fetch("{{ url_for('api.graficos_sexo') }}").then(res => res.json()),
                fetch("{{ url_for('api.graficos_peso') }}").then(res => res.json()),
                fetch("{{ url_for('api.graficos_gmd') }}").then(res => res.json())
            ]).then(([dadosSexo, dadosPeso, dadosGmd]) => {
                if (dadosSexo.error || dadosPeso.error || dadosGmd.error) throw new Error("Falha na API");
                
                dadosGlobais = { 
                    sexo: dadosSexo, 
                    peso: dadosPeso, 
                    gmd_medio: dadosGmd.gmd_medio 
                };

                // 3. Salva a nova cópia no navegador com a hora exata
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    timestamp: Date.now(),
                    dados: dadosGlobais
                }));

                desenharGraficos(false);
            }).catch(err => {
                console.error(err);
                document.getElementById('loadSexo').innerText = "Falha de conexão";
                document.getElementById('loadPeso').innerText = "Falha de conexão";
                document.getElementById('txtGMD').innerText = "--";
            });
        }

        // Inicia o processo
        carregarDados();
    </script>
</body>
</html>
